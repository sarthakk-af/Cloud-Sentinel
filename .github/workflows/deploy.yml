name: Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          # Increase timeout – docker build takes 3-5 min on t3.small
          command_timeout: 20m
          script: |
            set -e

            # ── 1. Add 2 GB swap if it doesn't already exist ──────────────────
            # t3.small has 2 GB RAM; torch build needs headroom.
            if [ ! -f /swapfile ]; then
              sudo fallocate -l 2G /swapfile
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            fi

            # ── 2. Pull latest code ───────────────────────────────────────────
            cd ~/Cloud-Sentinel
            git pull

            # ── 3. Stop & remove old container (ignore errors if none exists) ─
            sudo docker stop cloud-sentinel || true
            sudo docker rm  cloud-sentinel || true

            # ── 4. Build new image ────────────────────────────────────────────
            sudo docker build -t cloud-sentinel .

            # ── 5. Run with restart-policy so it survives OOM / reboots ───────
            sudo docker run -d \
              --name cloud-sentinel \
              --restart unless-stopped \
              --env-file .env \
              -p 8000:8000 \
              --memory="1.6g" \
              --memory-swap="3g" \
              cloud-sentinel

            # ── 6. Clean up dangling images to save disk space ────────────────
            sudo docker image prune -f